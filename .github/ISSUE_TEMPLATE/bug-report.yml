name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please fill out the details below."

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue and what you expected to happen.
      placeholder: "When I ..., I expected ..., but ..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Flow Tracker
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Flow Tracker version
      placeholder: "e.g. 0.1.2"
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS and version
      placeholder: "e.g. macOS 14.6, Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs or add screenshots if available.
      render: shell
